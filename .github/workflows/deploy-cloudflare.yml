name: Deploy to Cloudflare

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy production Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_APP_URL: https://calorie-flow.vladimirdd96.workers.dev
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - name: Verify Supabase deployment configuration
        run: |
          test -n "$NEXT_PUBLIC_SUPABASE_URL"
          test -n "$NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY"
      - run: npm run build:cloudflare
      - name: Deploy Worker
        run: >-
          npx wrangler deploy
          --var "SUPABASE_URL:$SUPABASE_URL"
          --var "SUPABASE_PUBLISHABLE_KEY:$SUPABASE_PUBLISHABLE_KEY"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
